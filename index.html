<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gautam Pro Scanner V6.0 | Select & Trade</title>
    <style>
        :root { --green: #00ff88; --red: #ff3d00; --bg: #0b0e11; --card: #161a1e; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; padding: 20px; margin: 0; }
        .header { text-align: center; border-bottom: 2px solid var(--green); padding-bottom: 10px; margin-bottom: 25px; }
        
        .market-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .market-container { grid-template-columns: 1fr; } }

        .box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; }
        h2 { color: var(--green); font-size: 1.2rem; margin-top: 0; }

        select { width: 100%; padding: 12px; background: #252b32; color: white; border: 1px solid var(--green); border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        
        .btn-scan { background: var(--green); color: black; border: none; padding: 12px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }
        .btn-scan:disabled { background: #444; cursor: not-allowed; }

        /* Scanning UI */
        .scan-area { margin-top: 20px; display: none; position: relative; border: 1px dashed #555; padding: 20px; border-radius: 10px; }
        .line { position: absolute; width: 100%; height: 2px; background: var(--green); top: 0; left: 0; animation: move 2s infinite linear; box-shadow: 0 0 10px var(--green); }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }

        #timer { font-size: 2.5rem; font-weight: bold; color: var(--green); margin: 15px 0; }
        .signal-result { display: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin-top: 15px; }
        .call { background: #00c853; } .put { background: #d50000; }

        .edu-note { font-size: 12px; color: #aaa; margin-top: 10px; text-align: left; border-left: 2px solid var(--green); padding-left: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h1>GAUTAM PREMIUM SIGNAL CENTER</h1>
    <p>Select Pair -> Analysis Indicators -> Get 1m Signal</p>
</div>

<div class="market-container">
    <div class="box">
        <h2>🌍 REAL MARKET (40+ PAIRS)</h2>
        <select id="realSelect">
            <option value="">-- Select Currency --</option>
            <option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option><option>AUD/USD</option>
            <option>USD/CAD</option><option>EUR/JPY</option><option>GBP/JPY</option><option>NZD/USD</option>
            <option>EUR/GBP</option><option>USD/CHF</option><option>AUD/JPY</option><option>CAD/JPY</option>
            </select>
        <button class="btn-scan" onclick="startScan('realSelect', 'realScan', 'realTimer', 'realResult', 'realEdu')">ANALYZE MARKET</button>
        
        <div id="realScan" class="scan-area">
            <div class="line"></div>
            <div id="realTimer">00:10</div>
            <p>Scanning Support/Resistance...</p>
        </div>
        <div id="realResult" class="signal-result"></div>
        <div id="realEdu" class="edu-note" style="display:none;"></div>
    </div>

    <div class="box">
        <h2>💰 QUOTEX OTC MARKET</h2>
        <select id="otcSelect">
            <option value="">-- Select OTC Pair --</option>
            <option>USD/INR (OTC)</option><option>EUR/USD (OTC)</option><option>GBP/USD (OTC)</option>
            <option>USD/BRL (OTC)</option><option>USD/TRY (OTC)</option><option>AUD/CAD (OTC)</option>
            <option>NZD/JPY (OTC)</option><option>GBP/JPY (OTC)</option>
        </select>
        <button class="btn-scan" onclick="startScan('otcSelect', 'otcScan', 'otcTimer', 'otcResult', 'otcEdu')">ANALYZE OTC</button>

        <div id="otcScan" class="scan-area">
            <div class="line"></div>
            <div id="otcTimer">00:10</div>
            <p>Decoding Broker Algorithm...</p>
        </div>
        <div id="otcResult" class="signal-result"></div>
        <div id="otcEdu" class="edu-note" style="display:none;"></div>
    </div>
</div>

<script>
    function startScan(selectId, scanId, timerId, resultId, eduId) {
        const pair = document.getElementById(selectId).value;
        if(!pair) { alert("Please select a currency first!"); return; }

        const scanArea = document.getElementById(scanId);
        const timerEl = document.getElementById(timerId);
        const resultEl = document.getElementById(resultId);
        const eduEl = document.getElementById(eduId);

        scanArea.style.display = "block";
        resultEl.style.display = "none";
        eduEl.style.display = "none";

        let time = 10;
        const interval = setInterval(() => {
            time--;
            timerEl.innerText = `00:${time < 10 ? '0'+time : time}`;
            if(time <= 0) {
                clearInterval(interval);
                scanArea.style.display = "none";
                showSignal(pair, resultId, eduId);
            }
        }, 1000);
    }

    function showSignal(pair, resultId, eduId) {
        const resultEl = document.getElementById(resultId);
        const eduEl = document.getElementById(eduId);
        const isCall = Math.random() > 0.5;
        const accuracy = Math.floor(Math.random() * (98 - 89 + 1)) + 89;

        resultEl.style.display = "block";
        resultEl.className = `signal-result ${isCall ? 'call' : 'put'}`;
        resultEl.innerHTML = `${pair}<br>STRONG ${isCall ? 'CALL ↑' : 'PUT ↓'}<br>Confidence: ${accuracy}%`;

        eduEl.style.display = "block";
        eduEl.innerHTML = `
            <strong>Analysis:</strong><br>
            • Indicator: ${isCall ? 'RSI at 28 (Oversold)' : 'RSI at 72 (Overbought)'}<br>
            • Chart Pattern: ${isCall ? 'Hammer found at Support' : 'Shooting Star at Resistance'}<br>
            • Timeframe: 1 Minute Expiry
        `;
    }
</script>
</body>
</html>
