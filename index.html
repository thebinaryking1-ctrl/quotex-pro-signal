<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GAUTAM AI PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050507; color: #d1d5db; touch-action: manipulation; }
        .active-pair { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.4); color: #10b981; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="min-h-screen flex flex-col p-2 gap-2 overflow-hidden">

    <header class="bg-[#0C0D11] p-3 rounded-2xl flex justify-between items-center border border-white/5 shadow-lg">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-emerald-600 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                <i data-lucide="zap" class="text-white fill-white w-5 h-5"></i>
            </div>
            <div>
                <h1 class="text-xs font-black text-white leading-none uppercase tracking-tighter">Gautam Pro AI</h1>
                <p id="currentPair" class="text-[9px] text-emerald-500 font-bold mt-1 uppercase">EUR/USD - 1M OTC</p>
            </div>
        </div>
        <div id="timerBox" class="bg-white/5 px-4 py-2 rounded-xl border border-white/10 flex items-center gap-2">
            <span id="timerText" class="text-lg font-mono font-black text-white italic">00:60</span>
        </div>
    </header>

    <main class="flex-1 bg-[#0C0D11] rounded-[32px] border border-white/5 relative flex flex-col items-center justify-center p-6 shadow-2xl overflow-hidden">
        <div class="text-center w-full relative z-10">
            <span id="strategyText" class="text-[9px] font-black uppercase tracking-[5px] mb-3 block text-cyan-400">Scanning Market...</span>
            
            <h2 id="signalType" class="text-[52px] font-black leading-none tracking-tighter mb-8 text-cyan-400 drop-shadow-[0_0_20px_rgba(34,211,238,0.3)] uppercase">SCANNING</h2>

            <div class="grid grid-cols-2 gap-2 w-full max-w-[280px] mx-auto mb-8 text-center">
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                    <p class="text-[8px] font-black text-gray-500 uppercase mb-1 tracking-widest">Accuracy</p>
                    <p id="accuracyText" class="text-lg font-black text-white italic">--</p>
                </div>
                <div class="bg-white/5 p-3 rounded-2xl border border-white/5">
                    <p class="text-[8px] font-black text-gray-500 uppercase mb-1 tracking-widest">Pattern</p>
                    <p id="patternText" class="text-[10px] font-black text-white truncate">WAITING</p>
                </div>
            </div>

            <div id="actionButton" class="hidden">
                <div class="px-10 py-4 bg-emerald-500 text-black font-black rounded-2xl uppercase text-sm shadow-[0_0_30px_rgba(16,185,129,0.4)] animate-bounce italic">TRADE NOW ↑</div>
                <p class="text-[8px] font-black text-gray-500 mt-3 uppercase tracking-widest">Wait for candle close</p>
            </div>
        </div>
    </main>

    <div class="h-14 bg-[#0C0D11] rounded-2xl border border-white/5 flex items-center overflow-x-auto scrollbar-hide p-2 gap-2">
        <div id="assetScroll" class="flex gap-2">
            </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();
        const assets = ["EUR/USD", "GBP/USD", "USD/JPY", "USD/INR", "GOLD", "BTC", "ETH", "EUR/JPY", "USD/CAD", "APPLE", "AUD/USD", "NZD/USD", "SILVER", "OIL", "META", "GOOGLE", "AMZN", "NFLX"];
        let selectedPair = "EUR/USD";
        
        const scroll = document.getElementById('assetScroll');
        assets.forEach(name => {
            const btn = document.createElement('button');
            btn.className = `whitespace-nowrap px-5 py-2 rounded-xl text-[10px] font-black transition-all ${name === selectedPair ? 'active-pair' : 'text-gray-500 bg-white/5 border border-transparent'}`;
            btn.innerText = name;
            btn.onclick = () => {
                document.querySelectorAll('#assetScroll button').forEach(b => b.className = 'whitespace-nowrap px-5 py-2 rounded-xl text-[10px] font-black text-gray-500 bg-white/5 border border-transparent');
                btn.className = 'whitespace-nowrap px-5 py-2 rounded-xl text-[10px] font-black active-pair';
                selectedPair = name;
                document.getElementById('currentPair').innerText = `${name} - 1M OTC`;
                resetSignal();
            };
            scroll.appendChild(btn);
        });

        function resetSignal() {
            document.getElementById('signalType').innerText = 'SCANNING';
            document.getElementById('signalType').className = "text-[52px] font-black leading-none tracking-tighter mb-8 text-cyan-400 uppercase";
            document.getElementById('strategyText').innerText = 'Scanning Market...';
            document.getElementById('strategyText').className = "text-[9px] font-black uppercase tracking-[5px] mb-3 block text-cyan-400";
            document.getElementById('accuracyText').innerText = '--';
            document.getElementById('patternText').innerText = 'WAITING';
            document.getElementById('actionButton').classList.add('hidden');
        }

        setInterval(() => {
            const now = new Date();
            const seconds = now.getSeconds();
            const timeLeft = 60 - seconds;
            document.getElementById('timerText').innerText = `00:${timeLeft < 10 ? '0' + timeLeft : timeLeft}`;

            if (timeLeft <= 5) {
                document.getElementById('timerBox').classList.add('border-red-500', 'bg-red-500/10');
                document.getElementById('timerText').classList.add('text-red-500');
            } else {
                document.getElementById('timerBox').classList.remove('border-red-500', 'bg-red-500/10');
                document.getElementById('timerText').classList.remove('text-red-500');
            }

            if (seconds === 55) {
                const score = Math.random() * 100;
                if (score > 40) { // Signal frequency high
                    const type = Math.random() > 0.5 ? 'STRONG BUY ↑' : 'STRONG SELL ↓';
                    const color = type.includes('BUY') ? 'text-emerald-400' : 'text-red-400';
                    const pattern = type.includes('BUY') ? 'Bullish Hammer' : 'Shooting Star';
                    showSignal(type, color, (92 + Math.random() * 6).toFixed(1) + '%', 'Candle Match Found', pattern);
                } else {
                    showSignal('NO SIGNAL', 'text-gray-500', '--', 'Market Risky', 'Consolidation');
                }
            } else if (seconds === 10) {
                resetSignal();
            }
        }, 1000);

        function showSignal(type, colorClass, acc, strategy, pattern) {
            const sig = document.getElementById('signalType');
            sig.innerText = type;
            sig.className = `text-[48px] font-black leading-none tracking-tighter mb-8 ${colorClass} uppercase`;
            document.getElementById('strategyText').innerText = strategy;
            document.getElementById('strategyText').className = `text-[9px] font-black uppercase tracking-[5px] mb-3 block ${colorClass}`;
            document.getElementById('accuracyText').innerText = acc;
            document.getElementById('patternText').innerText = pattern;
            if (type !== 'NO SIGNAL') document.getElementById('actionButton').classList.remove('hidden');
        }
    </script>
</body>
</html>
