<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
        }

        /* Scanning Box */
        .scan-box {
            position: relative;
            width: 250px;
            height: 250px;
            border: 2px solid #333;
            background: rgba(0, 255, 0, 0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
        }

        /* Neon Corners */
        .scan-box::before {
            content: '';
            position: absolute;
            top: -5px; left: -5px; width: 260px; height: 260px;
            border: 3px solid #00FF00;
            clip-path: polygon(0 0, 20% 0, 20% 10%, 0 10%, 0 90%, 20% 90%, 20% 100%, 0 100%, 0% 100%, 80% 100%, 80% 90%, 100% 90%, 100% 100%, 100% 100%, 100% 10%, 80% 10%, 80% 0, 100% 0);
            pointer-events: none;
        }

        /* Moving Scan Line */
        .line {
            position: absolute;
            width: 100%;
            height: 3px;
            background: #00FF00;
            box-shadow: 0 0 15px #00FF00;
            top: 0;
            animation: scan 2s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* Timer Text */
        #timer {
            font-size: 50px;
            font-weight: bold;
            color: #00FF00;
            margin-bottom: 10px;
            z-index: 10;
        }

        .label {
            font-size: 14px;
            letter-spacing: 2px;
            color: #ccc;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="scan-box">
        <div class="line"></div>
        <div id="timer">05</div>
        <div class="label" id="status">Analyzing...</div>
    </div>

    <script>
        let count = 5;
        const timerElement = document.getElementById('timer');
        const statusElement = document.getElementById('status');

        const countdown = setInterval(() => {
            count--;
            timerElement.innerText = count < 10 ? "0" + count : count;

            if (count <= 0) {
                clearInterval(countdown);
                timerElement.innerText = "DONE";
                statusElement.innerText = "Success!";
                statusElement.style.color = "#00FF00";
            }
        }, 1000);
    </script>

</body>
</html>
