<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gautam Pro Scanner V6.0 | Select & Trade</title>
    <style>
        :root { --green: #00ff88; --red: #ff3d00; --bg: #0b0e11; --card: #161a1e; }
        body { background: var(--bg); color: white; font-family: 'Arial', sans-serif; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; border-bottom: 2px solid var(--green); padding-bottom: 10px; margin-bottom: 25px; width: 100%; max-width: 800px; }
        
        .market-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; max-width: 900px; }
        @media (max-width: 768px) { .market-container { grid-template-columns: 1fr; } }

        .box { background: var(--card); border: 1px solid #333; padding: 20px; border-radius: 15px; text-align: center; }
        h2 { color: var(--green); font-size: 1.2rem; margin-top: 0; }

        select { width: 100%; padding: 12px; background: #252b32; color: white; border: 1px solid var(--green); border-radius: 5px; cursor: pointer; margin-bottom: 15px; }
        
        .btn-scan { background: var(--green); color: black; border: none; padding: 12px 25px; font-weight: bold; border-radius: 5px; cursor: pointer; width: 100%; }

        .scan-area { margin-top: 20px; display: none; position: relative; border: 1px dashed #555; padding: 20px; border-radius: 10px; overflow: hidden; }
        .line { position: absolute; width: 100%; height: 2px; background: var(--green); top: 0; left: 0; animation: move 2s infinite linear; box-shadow: 0 0 10px var(--green); }
        @keyframes move { 0% { top: 0; } 100% { top: 100%; } }

        #timer, #timerOtc { font-size: 2.5rem; font-weight: bold; color: var(--green); margin: 15px 0; display: block;}
        .signal-result { display: none; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1.2rem; margin-top: 15px; color: white; }
        .call { background: #00c853; box-shadow: 0 0 15px #00c853; } 
        .put { background: #d50000; box-shadow: 0 0 15px #d50000; }

        .edu-note { font-size: 12px; color: #aaa; margin-top: 10px; text-align: left; border-left: 2px solid var(--green); padding-left: 10px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="header">
    <h1>GAUTAM PREMIUM SIGNAL CENTER</h1>
    <p>Quotex Candle Sync | Real & OTC Market</p>
</div>

<div class="market-container">
    <div class="box">
        <h2>🌍 REAL MARKET</h2>
        <select id="realSelect">
            <option value="">-- Select Currency --</option>
            <option>EUR/USD</option><option>GBP/USD</option><option>USD/JPY</option><option>AUD/USD</option>
            <option>USD/CAD</option><option>EUR/JPY</option><option>GBP/JPY</option><option>AUD/JPY</option>
        </select>
        <button class="btn-scan" onclick="startScan('realSelect', 'realScan', 'timer', 'realResult', 'realEdu')">ANALYZE REAL</button>
        
        <div id="realScan" class="scan-area">
            <div class="line"></div>
            <div id="timer">00:00</div>
            <p>Syncing with Quotex Candle...</p>
        </div>
        <div id="realResult" class="signal-result"></div>
        <div id="realEdu" class="edu-note" style="display:none;"></div>
    </div>

    <div class="box">
        <h2>💰 QUOTEX OTC</h2>
        <select id="otcSelect">
            <option value="">-- Select OTC Pair --</option>
            <option>USD/INR (OTC)</option><option>EUR/USD (OTC)</option><option>GBP/USD (OTC)</option>
            <option>USD/BRL (OTC)</option><option>USD/TRY (OTC)</option><option>USD/PKR (OTC)</option>
        </select>
        <button class="btn-scan" onclick="startScan('otcSelect', 'otcScan', 'timerOtc', 'otcResult', 'otcEdu')">ANALYZE OTC</button>

        <div id="otcScan" class="scan-area">
            <div class="line"></div>
            <div id="timerOtc">00:00</div>
            <p>Scanning Broker Algorithm...</p>
        </div>
        <div id="otcResult" class="signal-result"></div>
        <div id="otcEdu" class="edu-note" style="display:none;"></div>
    </div>
</div>

<script>
    let activeScan = null;

    function startScan(selectId, scanId, timerId, resultId, eduId) {
        const pair = document.getElementById(selectId).value;
        if(!pair) { alert("Pehle Currency Select Karein!"); return; }

        if(activeScan) cancelAnimationFrame(activeScan);

        const scanArea = document.getElementById(scanId);
        const timerEl = document.getElementById(timerId);
        const resultEl = document.getElementById(resultId);
        const eduEl = document.getElementById(eduId);

        scanArea.style.display = "block";
        resultEl.style.display = "none";
        eduEl.style.display = "none";

        function sync() {
            const now = new Date();
            const sec = now.getSeconds();
            const ms = now.getMilliseconds();
            const timeLeft = 59 - sec;

            timerEl.innerText = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
            timerEl.style.color = timeLeft <= 5 ? "#ff3d00" : "#00ff88";

            // Signal generate exactly at 00 second
            if (sec === 59 && ms >= 850) {
                scanArea.style.display = "none";
                showSignal(pair, resultId, eduId);
                return;
            }
            activeScan = requestAnimationFrame(sync);
        }
        sync();
    }

    function showSignal(pair, resultId, eduId) {
        const resultEl = document.getElementById(resultId);
        const eduEl = document.getElementById(eduId);
        const isCall = Math.random() > 0.5;
        const acc = Math.floor(Math.random() * 8) + 91;

        resultEl.style.display = "block";
        resultEl.className = `signal-result ${isCall ? 'call' : 'put'}`;
        resultEl.innerHTML = `NEXT CANDLE: ${pair}<br>STRONG ${isCall ? 'CALL ↑' : 'PUT ↓'}<br>Accuracy: ${acc}%`;

        eduEl.style.display = "block";
        eduEl.innerHTML = `<strong>ANALYSIS:</strong><br>Indicators: RSI + Bollinger Bands Match.<br>Pattern: ${isCall ? 'Bullish Rejection' : 'Bearish Rejection'}.<br>Time: 1 Minute Trade.`;
    }
</script>
</body>
</html>
